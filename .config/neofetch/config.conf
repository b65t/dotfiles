title_fqdn="off"

kernel_shorthand="off"

distro_shorthand="off"
os_arch="off"

uptime_shorthand="on"

memory_percent="off"
memory_unit="mib"

package_managers="on"

shell_path="off"
shell_version="off"

speed_type="bios_limit"
speed_shorthand="off"

cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

gpu_brand="on"
gpu_type="all"

refresh_rate="off"

gtk_shorthand="off"
gtk2="on"
gtk3="on"

public_ip_host="http://ident.me"
public_ip_timeout=2

de_version="on"

disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"
mpc_args=()

colors=(4 7 7 4 4 7)

bold="on"
underline_enabled="on"
underline_char="-"
separator="Ņ«Ŗ"

block_range=(0 15)
color_blocks="off"
block_width=3
block_height=1

col_offset="auto"

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

# -- Backend --
image_backend="kitty"                                  # 'ascii', 'caca', 'chafa', 'jp2a', 'iterm2', 'off', 'pot', 'termpix', 'pixterm', 'tycat', 'w3m', 'kitty'
image_source="/home/islam//.config/neofetch/osage.png" # 'ascii', 'wallpaper', '/path/to/img', '/path/to/ascii', '/path/to/dir/' # with backend "kitty"
#image_source="${HOME}/.config/neofetch/ascii/arch.txt"
#image_source="${HOME}/.config/neofetch/images/archcat.png" # with backend "kitty"

# -- Ascii --
ascii_distro="arch_small" # 'auto', for some: '{distro name}_old', '{distro name}_small', flavors of Ubuntu
ascii_colors=(distro)
ascii_bold="on"

# -- Image --
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"   # 'normal', 'fit', 'fill'
crop_offset="center" # 'northwest', 'north', 'northeast', 'west', 'center', 'east', 'southwest', 'south', 'southeast'
image_size="14%"     # '00px', '00%'
gap=5                # gap between image and text
